game.crash.reason.mod_resolution_missing_minecraft=˙uoᴉsɹǝʌ ʇɟɐɹɔǝuᴉW sᴉɥʇ ɥʇᴉʍ ǝꞁqᴉʇɐdɯoɔ sᴉ ʇɐɥʇ uoᴉsɹǝʌ ɐ ꞁꞁɐʇsuᴉ pꞁnoɥs noʎ 'ǝsᴉʍɹǝɥʇO\n\n˙ǝɔuɐʇsuᴉ ɹnoʎ ɟo uoᴉsɹǝʌ ǝɯɐᵷ ǝɥʇ ǝᵷuɐɥɔ pꞁnoɥs noʎ 'pǝꞁꞁɐʇsuᴉ uoᴉsɹǝʌ poɯ sᴉɥʇ ɥʇᴉʍ ʎɐꞁd oʇ ʇuɐʍ noʎ ɟI\n\n˙%2$s uoᴉsɹǝʌ ʇɟɐɹɔǝuᴉW sǝɹᴉnbǝɹ "%1$s"\n\n˙uoᴉsɹǝʌ ʇɟɐɹɔǝuᴉW ʇuǝɹɹnɔ ǝɥʇ ɥʇᴉʍ ǝꞁqᴉʇɐdɯoɔuᴉ sᴉ poɯ ɐ ǝsnɐɔǝq pǝɥsɐɹɔ ǝɯɐᵷ ǝɥ⟘
