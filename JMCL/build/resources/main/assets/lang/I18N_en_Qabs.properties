game.crash.reason.optifine_is_not_compatible_with_forge=˙sǝɥsɐɹɔ ǝsnɐɔ ʎɐɯ suoᴉsɹǝʌ ǝuᴉℲᴉʇdO ʍoꞁ ooʇ ɹo ɥᵷᴉɥ ooʇ ʇɐɥʇ ǝʌǝᴉꞁǝq ǝʍ 'ᵷuᴉʇsǝʇ ɹǝʇɟⱯ\n\n˙"sɹǝpɐoꞀ → ǝɔuɐʇsuI ʇᴉpƎ" uᴉ uoᴉsɹǝʌ ǝuᴉℲᴉʇdO ǝɥʇ ǝᵷuɐɥɔ ɹo 'uoᴉsɹǝʌ ᵷuᴉpuodsǝɹɹoɔ ǝɥʇ ɥʇᴉʍ ǝɔuɐpɹoɔɔɐ ʇɔᴉɹʇs uᴉ ǝɔuɐʇsuᴉ ǝɥʇ ꞁꞁɐʇsuᴉǝɹ puɐ 'ǝuᴉℲᴉʇdO ɥʇᴉʍ ǝꞁqᴉʇɐdɯoɔ sᴉ uoᴉsɹǝʌ ǝᵷɹoℲ ǝɥʇ ɹǝɥʇǝɥʍ ʞɔǝɥɔ '<a href\="https\://optifine.net/downloads">ǝuᴉℲᴉʇdO ɟo ǝʇᴉsqǝʍ ꞁɐᴉɔᴉɟɟo</a> ǝɥʇ oʇ ǝʇɐᵷᴉʌɐu ǝsɐǝꞁԀ\n\n˙uoᴉʇɐꞁꞁɐʇsuᴉ ǝᵷɹoℲ ʇuǝɹɹnɔ ǝɥʇ ɥʇᴉʍ ǝꞁqᴉʇɐdɯoɔ ʇou sᴉ ǝuᴉℲᴉʇdO ǝsnɐɔǝq pǝɥsɐɹɔ ǝɯɐᵷ ǝɥ⟘
game.crash.reason.optifine_repeat_installation=˙"sɹǝpɐoꞀ → ǝɔuɐʇsuI ʇᴉpƎ" uᴉ ʇᴉ ꞁꞁɐʇsuᴉun ɹo ʎɹoʇɔǝɹᴉp poɯ ǝɥʇ uᴉ ǝuᴉℲᴉʇdO ǝʇǝꞁǝp ǝsɐǝꞁԀ\n\n˙uoᴉʇɐꞁꞁɐʇsuᴉ ǝuᴉℲᴉʇdO ǝʇɐɔᴉꞁdnp ɐ ɟo ǝsnɐɔǝq pǝɥsɐɹɔ ǝɯɐᵷ ǝɥ⟘
game.crash.reason.out_of_memory=˙ɹǝʇndɯoɔ ɹǝʇʇǝq ɐ pǝǝu ʎɐɯ noʎ 'sɯǝꞁqoɹd ǝsǝɥʇ ɹǝʇunoɔuǝ ꞁꞁᴉʇs noʎ ɟI\n\n˙"ʎɹoɯǝW → sᵷuᴉʇʇǝS ɔᴉɟᴉɔǝds-ǝɔuɐʇsuI/ꞁɐqoꞁ⅁" uᴉ ʎɹoɯǝɯ pǝʇɐɔoꞁꞁɐ ǝɥʇ ᵷuᴉsɐǝɹɔuᴉ ʎq ʇᴉ ᵷuᴉʌꞁosǝɹ ʎɹʇ uɐɔ noʎ ˙pǝꞁꞁɐʇsuᴉ spoɯ ʎuɐɯ ooʇ ɹo ǝꞁqɐꞁᴉɐʌɐ ʎɹoɯǝɯ ɥᵷnouǝ ʇou sᴉ ǝɹǝɥʇ ǝqʎɐW\n\n˙ʎɹoɯǝɯ ɟo ʇno uɐɹ ɹǝʇndɯoɔ ǝɥʇ ǝsnɐɔǝq pǝɥsɐɹɔ ǝɯɐᵷ ǝɥ⟘
game.crash.reason.resolution_too_high=˙WⱯᴚΛ ǝɹoɯ ɥʇᴉʍ pɹɐɔ sɔᴉɥdɐɹᵷ ɹǝʇʇǝq ɐ ᵷuᴉʎnq ɹǝpᴉsuoɔ ɹo uoᴉʇnꞁosǝɹ ɹǝʍoꞁ ɥʇᴉʍ ʞɔɐd ǝɹnʇxǝʇ/ǝɔɹnosǝɹ ɐ oʇ ɥɔʇᴉʍs pꞁnoɥs noʎ\n\n˙ɥᵷᴉɥ ooʇ sᴉ uoᴉʇnꞁosǝɹ ʞɔɐd ǝɹnʇxǝʇ/ǝɔɹnosǝɹ ǝɥʇ ǝsnɐɔǝq pǝɥsɐɹɔ ǝɯɐᵷ ǝɥ⟘
game.crash.reason.rtss_forest_sodium=˙sꞁᴉɐʇǝp ǝɹoɯ ɹoɟ <a href\="https\://github.com/CaffeineMC/sodium-fabric/wiki/Known-Issues\#rtss-incompatible">ǝɹǝɥ</a> ʞɔᴉꞁƆ\n\n˙ɯnᴉpoS ɥʇᴉʍ ǝꞁqᴉʇɐdɯoɔ ʇou sᴉ (SS⟘ᴚ) ɹǝʌɹǝS ꞁɐɔᴉʇsᴉʇɐʇS ɹǝun⟘ɐʌᴉᴚ ǝɥʇ ǝsnɐɔǝq pǝɥsɐɹɔ ǝɯɐᵷ ǝɥ⟘
