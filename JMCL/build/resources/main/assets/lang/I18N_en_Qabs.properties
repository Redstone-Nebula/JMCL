game.crash.reason.night_config_fixes=˙poɯ sᴉɥʇ ɟo <a href\="https\://github.com/Fuzss/nightconfigfixes">ʎɹoʇᴉsodǝɹ qnHʇᴉ⅁</a> ǝɥʇ ʇᴉsᴉʌ 'uoᴉʇɐɯɹoɟuᴉ ǝɹoɯ ɹoℲ\n\n˙ɯǝꞁqoɹd sᴉɥʇ ɥʇᴉʍ noʎ dꞁǝɥ ʎɐɯ ɥɔᴉɥʍ 'poɯ <a href\="https\://www.curseforge.com/minecraft/mc-mods/night-config-fixes">sǝxᴉℲ ᵷᴉɟuoƆ ʇɥᵷᴉN</a> ǝɥʇ ᵷuᴉꞁꞁɐʇsuᴉ ʎɹʇ uɐɔ noʎ\n\n˙ᵷᴉɟuoƆ ʇɥᵷᴉN ɥʇᴉʍ sɯǝꞁqoɹd ǝɯos ɟo ǝsnɐɔǝq pǝɥsɐɹɔ ǝɯɐᵷ ǝɥ⟘
game.crash.reason.no_class_def_found_error=˙dꞁǝɥ ɹoɟ ǝuoǝɯos ʞsɐ ɹo spoɯ ꞁꞁɐ puɐ ǝɯɐᵷ ǝɥʇ ꞁꞁɐʇsuᴉǝɹ oʇ pǝǝu ʎɐɯ noʎ\n\n˙pǝʇdnɹɹoɔ ǝɹɐ sǝꞁᴉɟ ǝɯos ɹo 'pǝꞁꞁɐʇsuᴉ sᴉ poɯ ǝꞁqᴉʇɐdɯoɔuᴉ uɐ 'ᵷuᴉssᴉɯ sᴉ poɯ ɐ ǝsnɐɔǝq ǝq ʇɥᵷᴉɯ sᴉɥ⟘ ˙"%1$s" ᵷuᴉssᴉɯ sᴉ ǝɔuɐʇsuᴉ ǝɯɐᵷ ɹnoʎ\n\n˙ǝpoɔ ǝʇǝꞁdɯoɔuᴉ ɟo ǝsnɐɔǝq unɹ oʇ ǝnuᴉʇuoɔ ʇouuɐɔ ǝɯɐᵷ ǝɥ⟘
game.crash.reason.no_such_method_error=˙dꞁǝɥ ɹoɟ ǝuoǝɯos ʞsɐ ɹo spoɯ ꞁꞁɐ puɐ ǝɯɐᵷ ǝɥʇ ꞁꞁɐʇsuᴉǝɹ oʇ pǝǝu ʎɐɯ noʎ\n\n˙pǝʇdnɹɹoɔ ǝq ʇɥᵷᴉɯ sǝꞁᴉɟ ǝɯos ɹo 'poɯ ǝꞁqᴉʇɐdɯoɔuᴉ uɐ pǝꞁꞁɐʇsuᴉ 'poɯ ɐ ᵷuᴉssᴉɯ ǝq ʇɥᵷᴉɯ ǝɔuɐʇsuᴉ ǝɯɐᵷ ɹnoʎ\n\n˙ǝpoɔ ǝʇǝꞁdɯoɔuᴉ ɟo ǝsnɐɔǝq unɹ oʇ ǝnuᴉʇuoɔ ʇouuɐɔ ǝɯɐᵷ ǝɥ⟘
game.crash.reason.opengl_not_supported=˙ɹǝʇndɯoɔ ʍǝu ɐ ɹo pɹɐɔ sɔᴉɥdɐɹᵷ ʍǝu ɐ ᵷuᴉʇʇǝᵷ ɹǝpᴉsuoɔ ǝsɐǝꞁd 'sʇsᴉsɹǝd ɯǝꞁqoɹd ǝɥʇ ɟI ˙ᵷuᴉɹǝpuǝɹ ɹoɟ ʇᴉ ᵷuᴉsn pǝǝpuᴉ sᴉ ǝɯɐᵷ ǝɥʇ ǝɹns ǝʞɐɯ ǝsɐǝꞁd 'pɹɐɔ sɔᴉɥdɐɹᵷ pǝʇɐɔᴉpǝp ɐ sɐɥ ɹǝʇndɯoɔ ɹnoʎ ɟI\n\n˙uᴉɐᵷɐ ʎɹʇ uǝɥʇ puɐ uoᴉsɹǝʌ ʇsǝʇɐꞁ ǝɥʇ oʇ ɹǝʌᴉɹp ɔᴉɥdɐɹᵷ ɹnoʎ ǝʇɐpdn uɐɔ noʎ 'ɹO\n\n˙ǝuᴉɥɔɐɯ ꞁɐɔoꞁ ɹnoʎ uo ǝɯɐᵷ ǝɥʇ ʎɐꞁd ǝsɐǝꞁd 'ʇuǝɯuoɹᴉʌuǝ doʇʞsǝp ǝʇoɯǝɹ ɐ ᵷuᴉsn ɹo ʇǝuɹǝʇuI ǝɥʇ ɹǝʌo ǝɯɐᵷ ǝɥʇ ᵷuᴉɯɐǝɹʇs ǝɹɐ noʎ ɟI\n\n˙Ꞁ⅁uǝdO ʇɹoddns ʇou sǝop ɹǝʌᴉɹp sɔᴉɥdɐɹᵷ ɹnoʎ ǝsnɐɔǝq pǝɥsɐɹɔ ǝɯɐᵷ ǝɥ⟘
game.crash.reason.openj9=˙ǝuo pɐoꞁuʍop uɐɔ noʎ 'ǝuo ǝʌɐɥ ʇou op noʎ ɟI ˙ǝɯɐᵷ ǝɥʇ ɥɔunɐꞁǝɹ puɐ "ɐʌɐſ → sᵷuᴉʇʇǝS ɔᴉɟᴉɔǝds-ǝɔuɐʇsuI/ꞁɐqoꞁ⅁" uᴉ WΛſ ʇodsʇoH ǝɥʇ sǝsn ʇɐɥʇ ɐʌɐſ ɐ oʇ ɥɔʇᴉʍs ǝsɐǝꞁԀ ˙WΛſ 6ſuǝdO uɐ uo unɹ oʇ ǝꞁqɐun sᴉ ǝɯɐᵷ ǝɥ⟘
