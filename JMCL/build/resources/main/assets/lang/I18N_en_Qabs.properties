game.crash.reason.modmixin_failure=˙poɯ ɹoɹɹǝ ǝɥʇ puᴉɟ oʇ ᵷoꞁ ǝɥʇ ʞɔǝɥɔ uɐɔ noʎ\n\n˙ʇuǝɯuoɹᴉʌuǝ ʇuǝɹɹnɔ ǝɥʇ ɥʇᴉʍ ǝꞁqᴉʇɐdɯoɔuᴉ sᴉ ɹo ᵷnq ɐ sɐɥ poɯ ǝɥʇ ʇɐɥʇ suɐǝɯ ʎꞁꞁɐɹǝuǝᵷ sᴉɥ⟘\n\n˙ʇɔǝɾuᴉ oʇ pǝꞁᴉɐɟ spoɯ ǝɯos ǝsnɐɔǝq pǝɥsɐɹɔ ǝɯɐᵷ ǝɥ⟘
