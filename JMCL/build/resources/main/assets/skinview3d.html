<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin Viewer</title>
<script src="https://unpkg.com/skinview3d@3.4.2/dist/skinview3d.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>
<canvas id="skin_container"></canvas>
<script>
  let viewer = null;
  let pendingSkin = null;
  let pendingSlim = false;

  function initViewer(width, height) {
    const canvas = document.getElementById('skin_container');
    viewer = new skinview3d.SkinViewer({
      canvas: canvas,
      width: width || 300,
      height: height || 400,
      skin: null
    });

    // Use a darker, more natural ambient lighting
    viewer.globalLight.intensity = 1.2;
    viewer.cameraLight.intensity = 0.5;

    // Auto rotate
    viewer.autoRotate = true;

    // Walking animation
    viewer.animation = new skinview3d.WalkingAnimation();
    viewer.animation.speed = 0.6;

    // Apply any pending skin update
    if (pendingSkin) {
      viewer.loadSkin(pendingSkin, { slim: pendingSlim });
      pendingSkin = null;
    }
  }

  function updateSkin(dataUrl, isSlim) {
    if (viewer) {
      viewer.loadSkin(dataUrl, { slim: isSlim });
    } else {
      pendingSkin = dataUrl;
      pendingSlim = isSlim;
    }
  }

  function resize(width, height) {
    if (viewer) {
      viewer.width = width;
      viewer.height = height;
    }
  }
</script>
</body>
</html>
